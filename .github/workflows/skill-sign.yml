name: Sign dojo Binary (Cosign OIDC Keyless)

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'pkg/skill/**'
      - 'cmd/dojo/**'
      - 'go.mod'

jobs:
  sign-dojo-binary:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for OIDC token issuance (Cosign keyless signing)
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Build dojo binary
        run: go build -o dojo ./cmd/dojo/

      - name: Sign dojo binary (keyless OIDC)
        run: |
          cosign sign-blob \
            --yes \
            --output-signature dojo.sig \
            --output-certificate dojo.pem \
            dojo

      - name: Verify signature
        run: |
          cosign verify-blob \
            --certificate dojo.pem \
            --signature dojo.sig \
            --certificate-identity-regexp="https://github.com/DojoGenesis/" \
            --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
            dojo

      - name: Upload signed artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dojo-signed
          path: |
            dojo
            dojo.sig
            dojo.pem
