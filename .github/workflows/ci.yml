name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build all modules
        run: go build ./...

      - name: Vet all modules
        run: go vet ./...

      - name: Run tests
        run: go test -v -race ./...

      - name: Generate coverage report
        run: |
          go test -coverprofile=coverage.out ./...
          # Exclude generated protobuf code (provider/pb/) from coverage
          grep -v 'provider/pb/' coverage.out > coverage_filtered.out

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage_filtered.out

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        # Known panic in govulncheck SSA builder with Go 1.25 + chromedp's
        # go-json-experiment dependency (golang/go#73871). Fixed in Go 1.26.
        # Run in non-blocking mode until then; still surfaces real vulns.
        run: govulncheck ./... || echo "::warning::govulncheck exited with code $? — see golang/go#73871"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest

  docker:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build multi-arch image (no push)
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            -f Dockerfile \
            --tag agentic-gateway:ci-test \
            .

  e2e:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        run: go build -o agentic-gateway main.go

      - name: Start gateway
        run: |
          ./agentic-gateway &
          sleep 3

      - name: Health check
        run: |
          curl -sf http://localhost:7340/health || exit 1

      - name: Verify API endpoints respond
        run: |
          # Check that /v1/chat/completions returns 401 (auth required) or 200
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:7340/v1/chat/completions -X POST -H "Content-Type: application/json" -d '{"messages":[{"role":"user","content":"test"}]}')
          if [ "$STATUS" -eq "000" ]; then
            echo "Gateway not responding"
            exit 1
          fi
          echo "API responded with status $STATUS"

      - name: Verify admin endpoints
        run: |
          curl -sf http://localhost:7340/admin/metrics/prometheus || exit 1

      - name: Stop gateway
        if: always()
        run: pkill agentic-gateway || true
