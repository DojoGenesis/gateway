# secret-scan.yml - defense-in-depth secret scanning gate for AgenticGatewayByDojoGenesis.
# Part of the cross-repo coverage: handoff 2026-06-28_secret-scanning-coverage.
# Modeled on nightshift-v2/.github/workflows/secret-scan.yml.
#
# Two independent scanners run; either finding fails the check. Scan-only, no runtime impact.
#
# NOTE: GITLEAKS_LICENSE (org tier) currently lives only in nightshift-v2's CI secrets.
# It must be provisioned to THIS repo's Actions secrets (from the bws secrets backbone,
# not hand-entered) before the gitleaks job can run on an organization-owned repo.
# On personal-account repos the gitleaks-action runs without a license.

name: Secret Scan

on:
  pull_request:
  push:
    branches: [main, master]

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: Gitleaks secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
          GITLEAKS_CONFIG: .gitleaks.toml

  trufflehog:
    name: TruffleHog secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --only-verified

  all-clear:
    name: Secret scan - all clear
    runs-on: ubuntu-latest
    needs: [gitleaks, trufflehog]
    if: always()
    steps:
      - name: Check scanner results
        run: |
          if [[ "${{ needs.gitleaks.result }}" != "success" || "${{ needs.trufflehog.result }}" != "success" ]]; then
            echo "Gitleaks:   ${{ needs.gitleaks.result }}"
            echo "TruffleHog: ${{ needs.trufflehog.result }}"
            echo "Secret scan failed - see job logs. Merge blocked."
            exit 1
          fi
          echo "All secret scanners passed."
