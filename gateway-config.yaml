        max_backoff_ms: 10000

    - id: "zen_sci_grant"
      display_name: "ZenSci Grant MCP"
      namespace_prefix: "zen_sci_grant"
      # generate_proposal (App tool), validate_compliance, check_format

      transport:
        type: "stdio"
