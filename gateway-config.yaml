    #     max_backoff_ms: 10000

  # ─── Observability Configuration ──────────────────────────────────────
  observability:
    # Enable OTEL tracing for MCP tool invocations
    enabled: true

    # Trace provider (currently only "otel" is supported)
    trace_provider: "otel"

    # Attributes added to all MCP-related spans
    attributes:
      service.name: "agentic-gateway"
      mcp.host.enabled: "true"
      mcp.host.version: "v1.0.0"

    # Log level for MCP events
    log_level: "info"

    # Tool span sample rate (0.0-1.0, 1.0 = trace all tool invocations)
    tool_span_sample_rate: 1.0
