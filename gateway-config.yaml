    # Path configuration:
    #   Development:  export ZEN_SCI_SERVERS_ROOT=/path/to/zen-sci/servers
    #                 Uses esbuild-bundled index.bundle.js (self-contained, no node_modules needed).
    #                 Build bundles with: esbuild src/index.ts --bundle --platform=node
    #                   --format=esm --outfile=dist/index.bundle.js  (run per-server)
    #   Production:   dist/index.bundle.js files are bundled as Tauri resources alongside
    #                 the agentic-gateway binary; the portal sets ZEN_SCI_SERVERS_ROOT
    #                 to the Tauri resource extraction path at launch.
    #
    # Python engine configuration:
    #   PYTHON_PATH controls which python3 binary the MCP servers use.
    #   Each server env block uses ${PYTHON_PATH:-python3} so it falls back to
    #   the python3 on $PATH when PYTHON_PATH is not set (safe for dev machines).
    #   Set PYTHON_PATH explicitly to pin a venv interpreter:
    #   Development:  export PYTHON_PATH=/path/to/zen-sci/.venv/bin/python3
    #   Production:   Tauri portal injects this before spawning the gateway sidecar.

