        max_backoff_ms: 10000

    - id: "zen_sci_paper"
      display_name: "ZenSci Paper MCP"
      namespace_prefix: "zen_sci_paper"
      # convert_to_paper (App tool), validate_submission, list_templates

      transport:
        type: "stdio"
        command: "node"
        args: ["${ZEN_SCI_SERVERS_ROOT}/paper-mcp/dist/index.bundle.js"]
