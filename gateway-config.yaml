        env:
          LOG_LEVEL: "info"
          PYTHON_PATH: "${PYTHON_PATH}"
          PATH: "${PATH}"

      tools:
        allowlist: []
        blocklist: []

      timeouts:
        startup: 15
        tool_default: 60        # HTML email rendering
        health_check: 5

      health_check:
