  # ─── Observability Configuration ──────────────────────────────────────
  observability:
    # Enable OTEL tracing for MCP tool invocations
    enabled: true

    # Trace provider (currently only "otel" is supported)
    trace_provider: "otel"

    # Attributes added to all MCP-related spans
    attributes:
      service.name: "agentic-gateway"
      mcp.host.enabled: "true"
      mcp.host.version: "v1.0.0"

    # Log level for MCP events
    log_level: "info"

    # Tool span sample rate (0.0-1.0, 1.0 = trace all tool invocations)
    tool_span_sample_rate: 1.0

# ─── Channel Bridge (Era 3) ────────────────────────────────────────────────────
# Flywheel configuration: HTTP webhook → WebhookGateway → NATSBus
# → ChannelBridge → WorkflowExecutor → adapter.Send(reply)
#
# Era 3 Phase 1 Track A: InProcessBus retired from the production hot path.
# All channel traffic flows through the embedded NATS + JetStream bus.
#
# NATS subject conventions (ADR-015 addendum):
#   dojo.channel.message.{platform}  — inbound normalized ChannelMessage
#   dojo.channel.reply.{platform}    — outbound reply from workflow execution
#   JetStream durable consumer per platform: "channel-{platform}"
#   Retention: 30 days (hot_retention)
#
# Each entry under `channels` maps to a registered WebhookAdapter or
# ActorAdapter in the WebhookGateway.  The bridge uses the same platform
# name to route replies back.
#
# Webhook path: POST /webhooks/{platform}

channel_bridge:
  # Backend event bus.  "nats" uses the embedded NATS bus from runtime/event.
  # "inprocess" is retained for test/dev only (gated by build tag).
  bus: "nats"   # nats (production) | inprocess (test only)

  # ─── Credential Store ─────────────────────────────────────────────────
  # Controls how channel adapters retrieve secrets (tokens, signing keys).
  # Era 3 Phase 1 Track A: adapters call creds.Get(ctx, platform, key)
  # instead of reading os.Getenv directly.
  #
  # Supported backends:
  #   "env"       — reads DOJO_{PLATFORM}_{KEY} from environment variables (default)
  #   "infisical" — reads from Infisical secrets manager via go-sdk
  #
  # Example (Infisical):
  #   credentials:
  #     backend: "infisical"
  #     infisical:
  #       site_url: "https://app.infisical.com"
  #       client_id: "${INFISICAL_CLIENT_ID}"
  #       client_secret: "${INFISICAL_CLIENT_SECRET}"
  #       project_id: "your-project-id"
  #       environment: "prod"
  #       secret_path: "/channel"
  credentials:
    backend: "env"   # env | infisical

  channels:
    - platform: "slack"
      type: "webhook"
      enabled: false
      credentials:
        token: "${SLACK_BOT_TOKEN}"
        signing_secret: "${SLACK_SIGNING_SECRET}"

    - platform: "discord"
      type: "actor"
      enabled: false
      credentials:
        token: "${DISCORD_BOT_TOKEN}"
        public_key: "${DISCORD_PUBLIC_KEY}"

    - platform: "telegram"
      type: "webhook"
      enabled: false
      credentials:
        token: "${TELEGRAM_BOT_TOKEN}"

    - platform: "email"
      type: "webhook"
      enabled: false
      credentials:
        api_key: "${SENDGRID_API_KEY}"

    - platform: "sms"
      type: "webhook"
      enabled: false
      credentials:
        account_sid: "${TWILIO_ACCOUNT_SID}"
        auth_token: "${TWILIO_AUTH_TOKEN}"

    - platform: "webchat"
      type: "webhook"
      enabled: false
      credentials:
        token: "${WEBCHAT_TOKEN}"

    - platform: "teams"
      type: "webhook"
      enabled: false
      credentials:
        token: "${TEAMS_BOT_TOKEN}"
        tenant_id: "${TEAMS_TENANT_ID}"

    - platform: "whatsapp"
      type: "webhook"
      enabled: false
      credentials:
        token: "${WHATSAPP_TOKEN}"
        phone_number_id: "${WHATSAPP_PHONE_NUMBER_ID}"

  # Workflow trigger rules evaluated by ChannelBridge.
  # Evaluated in order; the first match wins.
  #
  # Fields:
  #   platform  — adapter name to match, or "*" for any platform
  #   pattern   — Go regexp matched against message text (omit = match all)
  #   workflow  — CAS workflow name to execute on match
  triggers:
    # Route Slack "dojo:" commands to the command-dispatcher workflow.
    - platform: "slack"
      pattern: "(?i)dojo:"
      workflow: "command-dispatcher"

    # Route design-review requests to the design-review pipeline.
    - platform: "slack"
      pattern: "(?i)design[- ]review"
      workflow: "design-review-pipeline"

    # Catch-all: any unmatched Discord message → default responder.
    - platform: "discord"
      workflow: "default-responder"

# ─── Storage Backend (Era 3 Cloud Sync) ───────────────────────────────────────
# Controls which storage backend the Gateway uses for CAS and Audit.
# Set backend to "d1" to route all skill/workflow/audit writes to Cloudflare D1.
# Credentials are read from environment variables; never commit tokens here.
#
# D1 database IDs (provisioned 2026-04-05):
#   cas:   a5d9d6c5-edb7-42a6-afa3-0065916fe8d5  (dojo-cas)
#   audit: a1b0824f-2d5c-43bd-ac6f-a410a38be27e  (dojo-audit)
storage:
  # "local"  — SQLite on disk (default, no network required)
  # "d1"     — Cloudflare D1 via REST API (requires CF credentials below)
  backend: "local"

  local:
    cas_db_path: "./data/cas.db"
    audit_db_path: "./data/audit.db"

  d1:
    account_id: "${CLOUDFLARE_ACCOUNT_ID}"
    api_token: "${CLOUDFLARE_D1_TOKEN}"
    cas_database_id: "a5d9d6c5-edb7-42a6-afa3-0065916fe8d5"
    audit_database_id: "a1b0824f-2d5c-43bd-ac6f-a410a38be27e"
