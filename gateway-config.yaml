        env:
          LOG_LEVEL: "info"
          PYTHON_PATH: "${PYTHON_PATH:-python3}"
          PATH: "${PATH}"

      tools:
        allowlist: []
        blocklist: []

      timeouts:
        startup: 15
        tool_default: 120       # LaTeX compilation can take 30-90s on complex documents
        health_check: 5

      health_check:
