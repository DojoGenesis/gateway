          PYTHON_PATH: "${PYTHON_PATH}"
          PATH: "${PATH}"

      tools:
        allowlist: []
        blocklist: []

      timeouts:
        startup: 15
        tool_default: 120       # Beamer compilation is heavy; Reveal.js is fast
        health_check: 5

      health_check:
        enabled: true
