# Gateway MCP Configuration (Production)
# MCP Host Configuration per gateway-mcp-contract.md specification
# Version: 1.0.0

version: "1.0"

# ─── Feature Flags ────────────────────────────────────────────────────────────
# Controls which v1.1 capabilities are active at runtime.
# Set to false to disable a feature without removing its code.
features:
  # Enable the full LLM ↔ tool agentic loop in handleGatewayAgentChat.
  # When false the handler falls back to a single GenerateCompletion call.
  tool_calling: true

  # Expose the GET /v1/gateway/documents/:id endpoint and register the
  # built-in get_document tool so agents can fetch document content directly.
  get_document_tool: true

  # Parse and return patch_intent blocks from agent responses.
  # When false the raw response text is returned as-is without extraction.
  patch_intent: true

  # Allow POST /v1/settings/providers to accept and store provider API keys.
  provider_key_management: true

  # Route Ollama models without native tool support through the text-mode
  # tool fallback (generateWithTextToolFallback). Disable to skip the
  # model capability check and always use the standard path.
  ollama_tool_fallback: true

mcp:
  # ─── Global MCP Settings ──────────────────────────────────────────────
  global:
    # Default timeout for all MCP tool calls (seconds)
    default_tool_timeout: 30

    # Reconnection strategy for lost connections
    reconnect:
      max_retries: 3
      initial_backoff_ms: 1000
      max_backoff_ms: 30000
      backoff_multiplier: 2.0

    # Health check interval (seconds)
    health_check_interval: 60

    # Buffer size for streamed responses
    response_buffer_size: 1048576  # 1 MB

  # ─── Individual MCP Server Definitions ────────────────────────────────
