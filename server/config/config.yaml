# AgenticGateway v1.0.0 Configuration

# Server settings
port: "8080"
python_backend_url: "http://localhost:8001"
environment: "development"
plugin_dir: "plugins"

# CORS allowed origins
allowed_origins:
  - "http://localhost:3000"
  - "http://localhost:3003"

# Model provider plugins
providers:
  # Mock provider (for testing only)
  - name: mock
    enabled: false
    priority: 4
    plugin_path: plugins/mock
    config: {}

  # DeepSeek API — cloud inference
  - name: deepseek-api
    enabled: true
    priority: 2
    config:
      api_key: ${DEEPSEEK_API_KEY}
      base_url: https://api.deepseek.com

  # Ollama — local inference (auto-detected)
  - name: ollama
    enabled: true
    priority: 3
    config:
      base_url: ${OLLAMA_HOST:-http://localhost:11434}

  # Anthropic — cloud inference
  - name: anthropic
    enabled: true
    priority: 2
    config:
      api_key: ${ANTHROPIC_API_KEY}

  # OpenAI — cloud inference
  - name: openai
    enabled: true
    priority: 2
    config:
      api_key: ${OPENAI_API_KEY}
      base_url: ${OPENAI_BASE_URL:-https://api.openai.com/v1}

  # Google Gemini — cloud inference
  - name: google
    enabled: true
    priority: 2
    config:
      api_key: ${GOOGLE_API_KEY}

  # Groq — cloud inference
  - name: groq
    enabled: true
    priority: 2
    config:
      api_key: ${GROQ_API_KEY}

  # Mistral — cloud inference
  - name: mistral
    enabled: true
    priority: 2
    config:
      api_key: ${MISTRAL_API_KEY}

  # Kimi (Moonshot AI) — cloud inference
  - name: kimi
    enabled: true
    priority: 2
    config:
      api_key: ${KIMI_API_KEY}
      base_url: ${KIMI_BASE_URL:-https://api.moonshot.ai/v1}

# Routing rules — "auto" means resolved dynamically at runtime based on loaded providers
routing:
  default_provider: auto                  # Best loaded provider (prefers local)
  guest_provider: auto                    # Best loaded local provider
  authenticated_provider: auto            # Best loaded cloud provider (falls back to local)

# Budget limits (in tokens)
budget:
  query_limit: 50000       # Max tokens per query
  session_limit: 200000    # Max tokens per session
  monthly_limit: 2000000   # Max tokens per month
