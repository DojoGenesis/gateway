# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# ADR-008: Binary name = agentic-gateway, container registry = GHCR

version: 2

project_name: agentic-gateway

before:
  hooks:
    - go mod download

builds:
  - id: agentic-gateway
    main: ./main.go
    binary: agentic-gateway
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/DojoGenesis/gateway/server.Version={{.Version}}
      - -X main.Commit={{.Commit}}
      - -X main.Date={{.Date}}
    ignore: []

archives:
  - id: default
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    files:
      - README.md
      - LICENSE*
      - CHANGELOG.md
      - CONTRIBUTING.md

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - 'README'
  groups:
    - title: Features
      regexp: '^feat:'
      order: 0
    - title: Bug Fixes
      regexp: '^fix:'
      order: 1
    - title: Others
      order: 999

dockers:
  - id: agentic-gateway-amd64
    ids: ["agentic-gateway"]
    goos: linux
    goarch: amd64
    dockerfile: Dockerfile.goreleaser
    image_templates:
      - "ghcr.io/trespies-source/agentic-gateway:v{{ .Version }}-amd64"
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--label=org.opencontainers.image.title={{.ProjectName}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.version={{.Version}}"
      - "--label=org.opencontainers.image.source=https://github.com/DojoGenesis/gateway"
    extra_files: []
  - id: agentic-gateway-arm64
    ids: ["agentic-gateway"]
    goos: linux
    goarch: arm64
    dockerfile: Dockerfile.goreleaser
    image_templates:
      - "ghcr.io/trespies-source/agentic-gateway:v{{ .Version }}-arm64"
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--label=org.opencontainers.image.title={{.ProjectName}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.version={{.Version}}"
      - "--label=org.opencontainers.image.source=https://github.com/DojoGenesis/gateway"
    extra_files: []

docker_manifests:
  - name_template: "ghcr.io/trespies-source/agentic-gateway:v{{ .Version }}"
    image_templates:
      - "ghcr.io/trespies-source/agentic-gateway:v{{ .Version }}-amd64"
      - "ghcr.io/trespies-source/agentic-gateway:v{{ .Version }}-arm64"
  - name_template: "ghcr.io/trespies-source/agentic-gateway:latest"
    image_templates:
      - "ghcr.io/trespies-source/agentic-gateway:v{{ .Version }}-amd64"
      - "ghcr.io/trespies-source/agentic-gateway:v{{ .Version }}-arm64"

release:
  github:
    owner: TresPies-source
    name: AgenticGatewayByDojoGenesis
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"
  header: |
    ## Agentic Gateway v{{.Version}}

    See [CHANGELOG.md](CHANGELOG.md) for full release notes.
  footer: |
    **Full Changelog**: https://github.com/DojoGenesis/gateway/compare/{{ .PreviousTag }}...{{ .Tag }}

    ---
    **Docker:** `docker pull ghcr.io/trespies-source/agentic-gateway:{{ .Version }}`
