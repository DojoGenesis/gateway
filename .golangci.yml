version: "2"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - gosec
    - bodyclose
    - nilerr
    - errorlint

  settings:
    gosec:
      excludes:
        - G104  # unhandled errors — covered by errcheck

issues:
  exclude-dirs:
    - vendor
    - docs
